<!DOCTYPE html>
<html>
<head><title>RANNTA Gateway</title></head>
<body>
  <h1>RANNTA Cross-Chain Pricing</h1>
  <div id="quote">Loading...</div>
  <script>
    fetch('/api/quote')
      .then(response => response.json())
      .then(data => {
        console.log("API Response Received:", data);
        document.getElementById('quote').innerText = 'Best Route: ' + (data.provider || 'N/A') + ' | Fee: ' + (data.fee || '0');
      })
      .catch(err => {
        document.getElementById('quote').innerText = 'Error loading data';
        console.error(err);
      });
  </script>
</body>
</html>
